<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>Acceso | Galería</title>
    <style>
        :root {
            --primary-purple: #6f42c1;
            --dark-purple: #4b2394;
            --deep-bg: #0f0c29;
        }

        body {
            background: radial-gradient(circle at center, #1a1a3a 0%, #0f0c29 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            color: white;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(111, 66, 193, 0.3);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(111, 66, 193, 0.1);
        }

        .login-icon {
            font-size: 3.5rem;
            color: var(--primary-purple);
            text-shadow: 0 0 15px rgba(111, 66, 193, 0.5);
            margin-bottom: 1rem;
        }

        .form-control {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 10px;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: var(--primary-purple);
            box-shadow: 0 0 10px rgba(111, 66, 193, 0.3);
            color: white;
        }

        .btn-purple {
            background: linear-gradient(45deg, var(--dark-purple), var(--primary-purple));
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            color: white;
        }

        .btn-purple:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(111, 66, 193, 0.4);
            color: white;
        }

        .alert-custom {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #ff8a94;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <div class="login-icon">
            <i class="bi bi-shield-lock"></i>
        </div>
        
        <h2 class="fw-bold mb-4">Bienvenido</h2>

        {% if form.errors %}
        <div class="alert alert-custom mb-4" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Usuario o clave incorrectos.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3 text-start">
                <label for="id_username" class="form-label small text-uppercase tracking-wider opacity-75">Usuario</label>
                <input type="text" name="username" id="id_username" class="form-control" placeholder="Tu usuario" required>
            </div>

            <div class="mb-4 text-start">
                <label for="id_password" class="form-label small text-uppercase tracking-wider opacity-75">Contraseña</label>
                <input type="password" name="password" id="id_password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-purple w-100 mb-3">
                INICIAR SESIÓN <i class="bi bi-arrow-right-short ms-1"></i>
            </button>
        </form>

        <div class="footer-text">
            © 2026 Galería Privada • Sistema de Gestión
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
